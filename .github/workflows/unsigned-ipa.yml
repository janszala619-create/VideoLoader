name: Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: List Xcode project
        run: |
          mkdir -p build/logs
          set -o pipefail
          xcodebuild -list -project ios/VideoLoader.xcodeproj | tee build/logs/xcodebuild-list.txt

      - name: Build VideoLoader app
        shell: bash
        run: |
          mkdir -p build/logs
          APP_LOG=build/logs/VideoLoader-unsigned.log
          set -o pipefail
          if ! xcodebuild \
            -project ios/VideoLoader.xcodeproj \
            -scheme VideoLoader \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CODE_SIGN_FLAGS="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            BUILD_DIR="$PWD/build" \
            SYMROOT="$PWD/build" \
            build 2>&1 | tee "$APP_LOG"; then
            echo "::error::Unsigned app build failed. Last 200 log lines:"
            tail -n 200 "$APP_LOG"
            exit 1
          fi

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build -type d -name VideoLoader.app | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find VideoLoader.app in build output."
            exit 1
          fi

          rm -rf build/Payload build/VideoLoader-unsigned.ipa
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry VideoLoader-unsigned.ipa Payload)

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoLoader-unsigned-ipa
          path: build/VideoLoader-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoLoader-unsigned-build-logs
          path: build/logs
          if-no-files-found: error
