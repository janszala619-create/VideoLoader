name: iOS-App als IPA bauen

on:
  push:
    branches: [main, codex/github-build-download-fix]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: App bauen (ohne Signierung)
        run: |
          xcodebuild -project ios/VideoLoader.xcodeproj \
            -scheme VideoLoader \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/VideoLoader.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: IPA packen
        run: |
          mkdir -p build/Payload
          cp -R "build/VideoLoader.xcarchive/Products/Applications/VideoLoader.app" build/Payload/
          cd build && zip -qry VideoLoader.ipa Payload

      - name: IPA zum Herunterladen bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: VideoLoader-ipa
          path: build/VideoLoader.ipa
          retention-days: 30
