name: iOS Build

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build VideoLoader
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project ios/VideoLoader.xcodeproj

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project ios/VideoLoader.xcodeproj \
            -scheme VideoLoader \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
