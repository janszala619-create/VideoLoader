name: iOS Build

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build VideoLoader
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project ios/VideoLoader.xcodeproj

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          if [ -z "$SIMULATOR_ID" ]; then
            echo "No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator $SIMULATOR_ID"
          set +e
          xcodebuild \
            -project ios/VideoLoader.xcodeproj \
            -scheme VideoLoader \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log
          BUILD_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$BUILD_STATUS" -ne 0 ]; then
            grep -E "error:|BUILD FAILED" xcodebuild.log | head -40 | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit "$BUILD_STATUS"
          fi
