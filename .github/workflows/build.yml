name: Build

on:
  push:
  pull_request:

jobs:
  server:
    name: Server syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile server
        run: python -m py_compile server/main.py

  ios:
    name: iOS simulator build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app
        run: |
          xcodebuild \
            -project ios/VideoLoader.xcodeproj \
            -scheme VideoLoader \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
