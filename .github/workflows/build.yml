name: Build

on:
  push:
  pull_request:

jobs:
  server:
    name: Server syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server dependencies
        run: pip install -r server/requirements.txt

      - name: Compile server
        run: python -m py_compile server/main.py

      - name: Run server tests
        run: python -m unittest discover -s tests

  ios:
    name: iOS Debug build check
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: List Xcode project
        run: |
          mkdir -p build/logs
          set -o pipefail
          xcodebuild -list -project ios/VideoLoader.xcodeproj | tee build/logs/xcodebuild-list.txt

      - name: Resolve scheme
        run: |
          if ! grep -q "VideoLoader" build/logs/xcodebuild-list.txt; then
            echo "::error::Expected scheme or target 'VideoLoader' was not listed by xcodebuild -list."
            exit 1
          fi
          echo "SCHEME=VideoLoader" >> "$GITHUB_ENV"
          echo "Using scheme: VideoLoader"

      - name: Build VideoLoader app
        shell: bash
        run: |
          mkdir -p build/logs
          APP_LOG=build/logs/VideoLoader-app.log
          set -o pipefail
          if ! xcodebuild \
            -project ios/VideoLoader.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CODE_SIGN_FLAGS="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            BUILD_DIR="$PWD/build" \
            SYMROOT="$PWD/build" \
            build 2>&1 | tee "$APP_LOG"; then
            echo "::error::VideoLoader app build failed. Last 200 log lines:"
            tail -n 200 "$APP_LOG"
            exit 1
          fi

      - name: Build ShareExtension
        shell: bash
        run: |
          mkdir -p build/logs
          EXT_LOG=build/logs/ShareExtension.log
          set -o pipefail
          if ! xcodebuild \
            -project ios/VideoLoader.xcodeproj \
            -target ShareExtension \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CODE_SIGN_FLAGS="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            BUILD_DIR="$PWD/build" \
            SYMROOT="$PWD/build" \
            build 2>&1 | tee "$EXT_LOG"; then
            echo "::error::ShareExtension build failed. Last 200 log lines:"
            tail -n 200 "$EXT_LOG"
            exit 1
          fi
