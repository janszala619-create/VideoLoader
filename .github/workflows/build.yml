name: Build

on:
  push:
  pull_request:

jobs:
  server:
    name: Server syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile server
        run: python -m py_compile server/main.py

      - name: Run server tests
        run: python -m unittest discover -s tests

  ios:
    name: iOS IPA build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app for iPhone
        run: |
          xcodebuild \
            -project ios/VideoLoader.xcodeproj \
            -scheme VideoLoader \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build/Release-iphoneos" \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/Release-iphoneos/VideoLoader.app build/ipa/Payload/
          cd build/ipa
          zip -qry ../VideoLoader-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoLoader-unsigned-ipa
          path: build/VideoLoader-unsigned.ipa
